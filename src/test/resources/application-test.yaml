spring:
  jpa:
    open-in-view: false #using it is bad idea bcz it initializes proxy
    hibernate.ddl-auto: validate
    generate-ddl: false # Flyway manages schema changes
    show-sql: true
  ai:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-pro
        completions-path: /chat/completions

llm:
  model-demo: deepseek-v4-pro
